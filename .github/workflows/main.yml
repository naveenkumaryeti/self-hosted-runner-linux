name: Deploy Backend

on:
  repository_dispatch:
    types:
      - database_deployed
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Validate database connectivity
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: node scripts/validate-database.js

      - name: Build Docker image
        run: docker build -t insurance-api:${{ github.sha }} .

      - name: Deploy backend
        run: echo "Deploy backend here"

      - name: Trigger frontend deployment
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          ORG_NAME: ${{ vars.ORG_NAME }}
          FRONTEND_REPO: ${{ vars.FRONTEND_REPO }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${ORG_NAME}/${FRONTEND_REPO}/dispatches" \
            -d '{"event_type":"backend_deployed","client_payload":{"environment":"production","api_url":"https://api.example.com","triggered_by":"insurance-api"}}'


#re

